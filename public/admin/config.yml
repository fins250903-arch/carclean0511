backend:
  name: github
  repo: fins250903-arch/carclean0511
  branch: main
  base_url: https://carinteriorcleaning.jp
  auth_endpoint: api/auth

media_folder: public/posts
public_folder: /posts

locale: ja

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'

collections:
  - name: blog
    label: ブログ記事
    label_singular: ブログ記事
    folder: src/content/blog
    path: '{{year}}/{{month}}/{{slug}}/index'
    slug: '{{year}}-{{month}}-{{day}}-{{shortSlug}}'
    extension: md
    format: frontmatter
    create: true
    delete: true
    summary: '{{date}} — {{title}}'
    sortableFields: ['date', 'title']
    fields:
      - label: 公開日
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        default: '{{now}}'
        required: true

      - label: タイトル（SEO・32文字目安）
        name: title
        widget: string
        required: true

      - label: URL用スラッグ（英字のみ）
        name: shortSlug
        widget: string
        required: true
        hint: '例: trucksaitama'
        pattern: ['^[a-z0-9-]+$', '英数字とハイフンのみ']

      - label: 地域名称（市区町村・エリア名）
        name: areaName
        widget: string
        required: false
        hint: '例: 横浜市、吹田市、那覇市 — 記事内の施工エリアを入力'

      - label: サムネイル画像
        name: coverImage
        widget: image
        required: false

      - label: "SEO対策（検索エンジン用設定）"
        name: "seo"
        widget: "object"
        summary: "SEO設定"
        fields:
          - {
              label: "メタ・タイトル（未入力時は上記タイトルを使用）",
              name: "meta_title",
              widget: "string",
              required: false,
              hint: "検索結果に表示されるタイトルです（推奨：30〜35文字）"
            }
          - {
              label: "メタ・ディスクリプション（記事の要約）",
              name: "meta_description",
              widget: "text",
              required: true,
              hint: "検索結果の解説文です。SNSのシェア時にも使われます（推奨：120文字前後）"
            }
          - {
              label: "主要キーワード（フォーカスキーワード）",
              name: "keywords",
              widget: "string",
              required: false,
              hint: "この記事で狙うSEOキーワード（カンマ区切り：例 Astro, SEO, ブログ）"
            }
          - {
              label: "インデックス拒否（noindex）",
              name: "noindex",
              widget: "boolean",
              default: false,
              hint: "チェックを入れると、検索エンジンにインデックスされなくなります（下書きや低品質ページの隠蔽用）"
            }

      - label: "SNS・マーケティング設定（OGP）"
        name: "ogp"
        widget: "object"
        summary: "SNSシェア設定"
        fields:
          - {
              label: "アイキャッチ・OGP画像",
              name: "og_image",
              widget: "image",
              required: false,
              hint: "X（旧Twitter）やFacebookでシェアされた際に表示される画像です"
            }
          - {
              label: "記事のタイプ",
              name: "og_type",
              widget: "select",
              options: ["article", "website"],
              default: "article"
            }

      - label: 本文
        name: body
        widget: markdown
        required: true
