name: GSC Analysis

# Search Console の実掲載順位レポート（npm run gsc:rank）。
# 手動実行 or 毎週月曜に、既存のサービスアカウントJSONキー認証で実行します。
on:
  workflow_dispatch:
    inputs:
      days:
        description: '集計期間（直近日数）'
        required: false
        default: '28'
      region:
        description: 'ページ別集計を絞る地域ID（例: gunma。空欄で全体）'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * 1' # 毎週月曜 00:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # サービスアカウントJSONキーで認証（Search Console 所有者権限が必要）
      # 結果は gsc-ranking-report.txt に保存し、run要約と成果物で確認できるようにする
      - name: Run GSC ranking analysis
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SITE_URL: ${{ vars.SITE_URL }}
          GSC_DAYS: ${{ github.event.inputs.days }}
          GSC_REGION: ${{ github.event.inputs.region }}
        run: |
          set -o pipefail
          npm run gsc:rank 2>&1 | tee gsc-ranking-report.txt

      # Actions の run 概要ページにレポートを表示（ダウンロード不要で確認可能）
      - name: Publish report to run summary
        if: always()
        run: |
          {
            echo "## GSC 検索順位レポート ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            echo '```text'
            cat gsc-ranking-report.txt 2>/dev/null || echo '(レポート生成なし)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # レポートを成果物として保存（履歴としてダウンロード・比較可能）
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gsc-ranking-report
          path: gsc-ranking-report.txt
          retention-days: 90
          if-no-files-found: warn
