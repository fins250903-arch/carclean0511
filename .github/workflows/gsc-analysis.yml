name: GSC Analysis

# Search Console の実掲載順位レポート（npm run gsc:rank）。
# 手動実行 or 毎週月曜に、既存のサービスアカウントJSONキー認証で実行します。
on:
  workflow_dispatch:
    inputs:
      days:
        description: '集計期間（直近日数）'
        required: false
        default: '28'
      region:
        description: 'ページ別集計を絞る地域ID（例: gunma。空欄で全体）'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * 1' # 毎週月曜 00:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # サービスアカウントJSONキーで認証（Search Console 所有者権限が必要）
      - name: Run GSC ranking analysis
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SITE_URL: ${{ vars.SITE_URL }}
          GSC_DAYS: ${{ github.event.inputs.days }}
          GSC_REGION: ${{ github.event.inputs.region }}
        run: npm run gsc:rank
